# ========================================
# TEST CONFIGURATION
# ========================================
# This configuration is used for integration tests
# Uses H2 in-memory database and embedded Redis mock

spring:
  application:
    name: limited-stock-drop-test

  # ========================================
  # H2 IN-MEMORY DATABASE (for tests)
  # ========================================
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false

  # ========================================
  # DISABLE REDIS FOR UNIT TESTS
  # ========================================
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# ========================================
# JWT CONFIGURATION (test values - base64 encoded)
# ========================================
jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW11c3QtYmUtYXQtbGVhc3QtNTEyLWJpdHMtbG9uZy1mb3ItaHM1MTItYWxnb3JpdGht

# ========================================
# APP CONFIGURATION
# ========================================
app:
  cors:
    allowed-origins:
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
    allow-credentials: true
    max-age: 3600

  cookie:
    secure: false

  scheduling:
    token-cleanup-cron: "0 0 2 * * ?"
    reservation-expiry-cron: "0 */1 * * * ?"

# ========================================
# LOGGING (minimal for tests)
# ========================================
logging:
  level:
    root: WARN
    com.jk.limited_stock_drop: INFO
    org.springframework.security: WARN
