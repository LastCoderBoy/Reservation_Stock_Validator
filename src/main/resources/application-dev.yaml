# ========================================
# DEVELOPMENT PROFILE
# ========================================
# Activate with: SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: DevHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false


  data:
    redis:
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 5000ms
        shutdown-timeout: 100ms

# App - Dev specific
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:4200

  cookie:
    secure: false  # Allow HTTP in dev

# Actuator - more details in dev
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans
  endpoint:
    health:
      show-details: always

# Logging - verbose in dev
logging:
  level:
    root: INFO
    com.jk.limited_stock_drop: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/reservation-service-dev.log
