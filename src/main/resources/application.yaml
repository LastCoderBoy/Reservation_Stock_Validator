# ========================================
# SERVICE CONFIGURATION
# ========================================
spring:
  application:
    name: limited-stock-drop

  # ========================================
  # DATABASE CONFIGURATION
  # ========================================
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ReservationHikariPool

  jpa:
    hibernate:
      ddl-auto: update  # Change to 'validate' in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false


  # ========================================
  # REDIS CONFIGURATION
  # ========================================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 5000ms
        shutdown-timeout: 100ms

# ========================================
# JWT CONFIGURATION
# ========================================
jwt:
  secret: ${JWT_SECRET}


# ========================================
# APP CONFIGURATION
# ========================================
app:
  cookie:
    secure: false  # Set to true in production when using HTTPS
  scheduling:
    token-cleanup-cron: "0 0 2 * * ?"  # Daily at 2:00 AM
    reservation-expiry-cron: "0 */1 * * * ?"  # Every 1 minute (for 5-min expiration check)



# ========================================
# ACTUATOR CONFIGURATION
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging:
  level:
    root: INFO
    com.jk.limited_stock_drop: DEBUG
    org.springframework.security: INFO
    org.springframework.cloud.netflix.eureka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/reservation-service.log
