# ========================================
# BASE CONFIGURATION (Shared across all profiles)
# ========================================
spring:
  application:
    name: limited-stock-drop

  # Database - common settings
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 2000ms

# JWT
jwt:
  secret: ${JWT_SECRET}

# App Configuration - common
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allow-credentials: true
    max-age: 3600

  cookie:
    secure: false  # Override to true in prod profile

  scheduling:
    token-cleanup-cron: "0 0 2 * * ?"
    reservation-expiry-cron: "0 */1 * * * ?"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}