# ========================================
# PRODUCTION PROFILE
# ========================================
# Activate with: SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    hikari:
      maximum-pool-size: 5      # Reduced for free tier
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000      # 5 min idle timeout
      max-lifetime: 900000      # 15 min max lifetime
      pool-name: ProdHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      lettuce:
        pool:
          max-active: 5         # Reduced for free tier
          max-idle: 3
          min-idle: 1
          max-wait: 5000ms
        shutdown-timeout: 100ms

# App - Production specific
app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS}

  cookie:
    secure: true  # HTTPS only in prod

# Actuator - restricted in prod
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized  # Only authenticated users see details

# Logging - minimal in prod
logging:
  level:
    root: WARN
    com.jk.limited_stock_drop: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/reservation-service.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
