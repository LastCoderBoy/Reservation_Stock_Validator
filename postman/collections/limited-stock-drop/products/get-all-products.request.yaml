$kind: http-request
name: Get All Products
method: GET
url: '{{baseUrl}}/api/v1/products'
order: 1000
queryParams:
  - key: page
    value: '0'
  - key: size
    value: '20'
  - key: sortBy
    value: name
  - key: sortDirection
    value: desc
  - key: search
    value: ''
  - key: category
    value: ''
    description: 'Enum: MEN, WOMEN, KIDS'
  - key: inStock
    value: ''
  - key: minPrice
    value: ''
  - key: maxPrice
    value: ''
